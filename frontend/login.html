<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("emr-theme");
          if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar — EMR Facilitador</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-body">
    <div class="login-layout">
      <header class="login-header">
        <div class="header__partner-logo login-header__logos">
          <img
            class="header__logo-img header__logo-img--softtek"
            src="/img/SofttekLogo-4web.svg"
            width="100"
            height="40"
            alt="Softtek"
          />
          <img
            class="header__logo-img header__logo-img--apsen"
            src="/img/logo_apsen.svg"
            width="88"
            height="36"
            alt="Apsen Farmacêutica"
          />
        </div>
        <h1 class="login-header__title">EMR Facilitador</h1>
        <p class="login-header__subtitle">Acesse com seu usuário para continuar</p>
      </header>

      <main class="login-card panel" aria-labelledby="login-title">
        <h2 id="login-title" class="login-card__title">Entrar</h2>
        <p id="login-error" class="login-card__error" role="alert" hidden></p>
        <form id="form-login" class="form-stack" novalidate>
          <label class="field">
            <span class="field__label">Usuário</span>
            <input type="text" id="login-user" name="username" required autocomplete="username" maxlength="64" />
          </label>
          <label class="field">
            <span class="field__label">Senha</span>
            <input
              type="password"
              id="login-pass"
              name="password"
              required
              autocomplete="current-password"
              maxlength="256"
            />
          </label>
          <button type="submit" class="btn btn--primary btn--block btn--glow" id="btn-login-submit">Entrar</button>
        </form>
        <p class="login-card__hint">
          Ambiente de teste: usuário <strong>teste</strong>, senha <strong>123456</strong> (altere em produção).
        </p>
      </main>

      <footer class="login-footer">
        <button type="button" class="theme-toggle login-theme" id="login-theme-toggle" aria-label="Alternar tema claro e escuro">
          <svg class="theme-toggle__icon theme-toggle__icon--sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.75" />
            <path stroke="currentColor" stroke-width="1.75" stroke-linecap="round" d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
          </svg>
          <svg class="theme-toggle__icon theme-toggle__icon--moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M21 14.5A8.5 8.5 0 0 1 9.5 3a6.5 6.5 0 1 0 11.5 11.5Z" />
          </svg>
        </button>
      </footer>
    </div>
    <script src="/login.js" defer></script>
  </body>
</html>
